services:
  neo4j:
    image: neo4j:latest
    container_name: vnic-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/genation-vnic # username/password; set NEO4J_AUTH=none to disable auth
      # - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes  # uncomment for Enterprise Edition
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/import:/var/lib/neo4j/import
      - ./neo4j/plugins:/plugins
